# This workflow builds the sdist on 3.10 and then installs that same sdist on

name: Create sdist install and test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Build sdist
      run: |
        set -x
        pip install --upgrade pip
        pip install build
        pip freeze

        python -m build . --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: the-sdist
        path: dist/scikit_surprise*

  install-and-test:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.13t", "3.14t"]
        include:
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: the-sdist
        path: dist/

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install sdist (Unix)
      if: runner.os != 'Windows'
      run: |
        set -x

        pip install --upgrade pip
        pip install dist/scikit_surprise-*.tar.gz -v

    - name: Install sdist (Windows)
      if: runner.os == 'Windows'
      run: |
        pip install --upgrade pip
        pip install (Get-ChildItem dist/scikit_surprise-*.tar.gz).FullName -v

    - name: Pip freeze
      run: |
        pip freeze

    - name: Run unit tests
      run: |
        pip install pandas pytest  # Or just use pip install ...[test] ?
        pytest -v
